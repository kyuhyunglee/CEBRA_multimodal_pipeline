paths:
  # Colab default. In VSCode, override this with a local path or another config.
  drive_base_path: /content/drive/MyDrive/cebra_data
  raw_dir: data/raw
  preprocessed_dir: /content/drive/MyDrive/cebra_data/preprocessed
  manifest_path: data/manifests/default_manifest.csv
  embedding_dir: /content/drive/MyDrive/cebra_data/embeddings
  model_dir: /content/drive/MyDrive/cebra_data/models/checkpoints

dataset:
  provider: ibl_one
  lab_subjects_dir: /content/drive/MyDrive/cebra_data/cache/churchlandlab/Subjects
  target_subjects: auto
  modalities:
    - probe
  probe_name: probe00
  bin_size: 0.025
  time_window_bins: 1
  time_shift_bins: 0
  continuous_label_file: continuous_labels.npy
  discrete_label_file: discrete_labels.npy
  continuous_columns:
    - choice
    - feedbackType
    - contrastLeft
    - contrastRight
    - probabilityLeft
  save_dtype: float32

preprocessing:
  # Expected standardized per-subject files:
  #   probe.npy             shape: (time, clusters), binned from spikes.times/clusters
  #   continuous_labels.npy shape: (time, decision/choice/reward/stimulus features)
  #   discrete_labels.npy   shape: (time,), choice/reward class for decision bins
  #   timestamps.npy shape: (time,), optional
  copy_from_drive: true
  require_labels: true
  skip_existing: true

model:
  architecture: offset10-model
  # Joint training can choose a different CEBRA encoder architecture per
  # modality. These names are passed to cebra.models.init for each session.
  architecture_by_modality:
    probe: offset10-model
    calcium: offset10-model
  hidden_dim: 64
  latent_dim: 16
  output_dimension: 8
  temperature: 1.0
  distance: cosine

training:
  batch_size: 128
  learning_rate: 0.0003
  max_iterations: 500
  # "behavior" is accepted by this project and mapped to CEBRA's "time_delta"
  # sampler, which uses shared continuous behavior/video labels.
  # "time" can be used for CEBRA-Time style training when labels are omitted.
  conditional: behavior
  device: auto
  seed: 0
